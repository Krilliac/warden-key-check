name: build

# Builds wardencheck on Windows (x64 + x86), Linux and macOS, runs the built-in
# self-test on every platform, and uploads each binary as a workflow artifact.
# When a tag like `v1.0.0` is pushed, the binaries are also attached to a GitHub
# Release, which gives stable, login-free direct download links.

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # required for the release job to upload assets

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            artifact: wardencheck-linux-x64
          - name: macos-arm64
            os: macos-latest
            artifact: wardencheck-macos-arm64
          - name: windows-x64
            os: windows-latest
            arch: x64
            artifact: wardencheck-windows-x64.exe
          - name: windows-x86
            os: windows-latest
            arch: x86
            artifact: wardencheck-windows-x86.exe
    steps:
      - uses: actions/checkout@v4

      # ---------- POSIX (Linux / macOS) ----------
      - name: Build (c++)
        if: runner.os != 'Windows'
        run: c++ -std=c++17 -O2 -Wall -Wextra -o "${{ matrix.artifact }}" wardencheck.cpp

      - name: Self-test
        if: runner.os != 'Windows'
        run: "./${{ matrix.artifact }} selftest"

      # ---------- Windows (MSVC) ----------
      - name: Set up MSVC (${{ matrix.arch }})
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Build (MSVC)
        if: runner.os == 'Windows'
        shell: cmd
        run: cl /std:c++17 /O2 /EHsc /W4 /Fe:${{ matrix.artifact }} wardencheck.cpp

      - name: Self-test
        if: runner.os == 'Windows'
        shell: cmd
        run: ${{ matrix.artifact }} selftest

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Stage release assets
        run: |
          mkdir -p release
          # download-artifact nests each artifact in its own folder; flatten it.
          find dist -type f -exec cp {} release/ \;
          # ship the manifest template alongside the binaries
          cp wardencheck.manifest release/ || true
          ls -l release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
